<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Button Click</title>
</head>
<body>
    <button id="btn">Click Me</button>
    <script>
        const btn = document.getElementById("btn");
        btn.addEventListener("click", function() {
            btn.style.transform = "translateX(-5px)";
            setTimeout(function() {
                btn.style.transform = "translateX(0)";
            }, 200);
        });
    </script>
</body>
</html>
