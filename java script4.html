<!DOCTYPE html>
<html>
    <body>
        Enter Birth year<input type="number" id ="year">
        <button onclick="calc()">calculate</button>
        <p id="result"></p>
        <script>
            function calc(){
                let year = document.getElementById("year").value;
                let age = 2026-year;
                document.getElementById("result").innerHTML="Age:"+age;
            }
            </script>
            </body>
            </html>
