<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student - Student Management System</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #6366f1; /* Indigo */
            --accent-secondary: #ec4899; /* Pink */
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 2rem;
        }

        /* Glassmorphism Card Style */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            padding: 2.5rem;
            margin-top: 1.5rem;
            transition: all 0.3s ease;
        }

        /* Title / Header Styling */
        .app-header {
            background: linear-gradient(90deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* Form Inputs Styling */
        .form-label {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        .form-control {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
            color: var(--text-primary);
        }

        /* Custom Action Buttons */
        .btn-submit {
            background: linear-gradient(135deg, var(--accent-primary) 0%, #4f46e5 100%);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(99, 102, 241, 0.6);
            color: white;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Input icons container */
        .input-group-custom {
            position: relative;
        }

        .input-group-custom i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .input-group-custom .form-control {
            padding-left: 2.75rem;
        }

        footer {
            margin-top: auto;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <!-- Main Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent pt-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <i class="bi bi-mortarboard-fill text-primary fs-3"></i>
                <span class="app-header fs-4">EduPulse</span>
            </a>
            <div class="d-flex align-items-center">
                <a href="/" class="btn-cancel text-decoration-none d-flex align-items-center gap-2" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
                    <i class="bi bi-arrow-left"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                
                <div class="glass-card">
                    <h3 class="mb-2 fw-bold text-center">Edit Student Record</h3>
                    <p class="text-secondary text-center mb-4">Modify the student details below</p>
                    
                    <form action="/edit/{{ student[0] }}" method="POST" class="needs-validation" novalidate>
                        <!-- Name Field -->
                        <div class="mb-4">
                            <label for="name" class="form-label mb-2">FULL NAME</label>
                            <div class="input-group-custom">
                                <i class="bi bi-person-fill"></i>
                                <input type="text" class="form-control" id="name" name="name" value="{{ student[1] }}" required>
                                <div class="invalid-feedback">Please enter the student's name.</div>
                            </div>
                        </div>

                        <!-- Email Field -->
                        <div class="mb-4">
                            <label for="email" class="form-label mb-2">EMAIL ADDRESS</label>
                            <div class="input-group-custom">
                                <i class="bi bi-envelope-fill"></i>
                                <input type="email" class="form-control" id="email" name="email" value="{{ student[2] }}" required>
                                <div class="invalid-feedback">Please enter a valid email address.</div>
                            </div>
                        </div>

                        <!-- Course Field -->
                        <div class="mb-5">
                            <label for="course" class="form-label mb-2">COURSE / DEPARTMENT</label>
                            <div class="input-group-custom">
                                <i class="bi bi-journal-bookmark-fill"></i>
                                <input type="text" class="form-control" id="course" name="course" value="{{ student[3] }}" required>
                                <div class="invalid-feedback">Please enter the course name.</div>
                            </div>
                        </div>

                        <!-- Submit Buttons -->
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-submit">
                                <i class="bi bi-save2 me-2"></i>Save Changes
                            </button>
                            <a href="/" class="btn btn-cancel text-center">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-4">
        <div class="container">
            <p class="mb-0">&copy; 2026 EduPulse Student Management System. Built with Flask, Bootstrap, and MySQL.</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Bootstrap Validation Script -->
    <script>
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms)
                .forEach(function (form) {
                    form.addEventListener('submit', function (event) {
                        if (!form.checkValidity()) {
                            event.preventDefault()
                            event.stopPropagation()
                        }
                        form.classList.add('was-validated')
                    }, false)
                })
        })()
    </script>
</body>
</html>
