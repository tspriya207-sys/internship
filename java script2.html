<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>JavaScript Page</title>
        <script>
            function goToPage() {
                document.body.innerHTML = '<h2>Page 2</h2><p>You have successfully navigated to page 2 using JavaScript.</p>';
            }
        </script>
    </head>
    <body>
        <h2>page</h2>
        <button onclick="goToPage()">Go to page 2</button>
    </body>
</html>
